<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wdyt Referral Page</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fingerprintjs2/2.1.0/fingerprint2.min.js"></script>
</head>
<body>
<h1>Welcome! Redirecting you...</h1>
<script>
    function generateFingerprint() {
        return new Promise((resolve) => {
            Fingerprint2.get(components => {
                const fingerprint = Fingerprint2.x64hash128(components.map(pair => pair.value).join(''), 31);
                resolve(fingerprint);
            });
        });
    }

    // Extract nonce from the URL path
    const nonce = "{{NONCE}}";

    generateFingerprint().then(fingerprint => {
        console.log("Generated Fingerprint:", fingerprint);

        // Send data to backend
        fetch(`{{BASE_URL}}/api/v1/referral/record/${nonce}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ fingerprint })
        }).then(() => {
            window.location.href = "https://thewdyt.com/";
        }).catch(error => console.error("Error sending data:", error));
    });
</script>
</body>
</html>
