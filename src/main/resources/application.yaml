server:
  port: 3333
  forward-headers-strategy: framework
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
configuration:
  topListCount: 3
aws:
  region: us-east-1
  profile: wdyt-test
  secret-name: wdyt-test-environment
  s3:
    bucket: wdyt-test-bucket
    endpoint: https://duoymrhqgte1g.cloudfront.net
integrations:
  create-robot:
    url: https://test.the2nd.ai/aiCompanion/api/wdyt/robot/createRobot
  background-extraction:
    url: http://3.229.32.99:4321/bg/remove
  image-classification:
    url: http://3.229.32.99:7654/upload
